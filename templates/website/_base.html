{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LMS Website{% endblock %}</title>

    <!-- Custom CSS -->
    <link href="{% static 'dist/css/website/styles.css' %}" rel="stylesheet">

    <!-- Font Awesome via CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Google Fonts via CDN -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-100">
    <!-- Main Content -->
    <div id="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- JS libraries -->
    <script src="{% static 'chart.js/dist/chart.umd.js' %}"></script>
    <script src="{% static 'leaflet/dist/leaflet.js' %}"></script>
    <script src="{% static 'aos/dist/aos.js' %}"></script>
    <script src="{% static 'animejs/lib/anime.min.js' %}"></script>
    <script src="{% static 'flowbite/dist/flowbite.js' %}"></script>

    <!-- Custom JS -->
    {% block extra_js %}{% endblock %}
</body>
</html>
