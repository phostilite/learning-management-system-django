{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LMS Supervisor{% endblock %}</title>

    <!-- Custom CSS -->
    <link href="{% static 'dist/css/supervisor/styles.css' %}" rel="stylesheet">

    <!-- Font Awesome via CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Google Fonts via CDN -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    {% block extra_css %}
    {% endblock %}
</head>
<body class="bg-gray-100">
    {% include './navbar.html' %}
    {% include './sidebar.html' %}

    <div id="main-content" class="p-4 lg:ml-64 mt-16">
        {% block content %}{% endblock %}
    </div>

    <!-- JS libraries -->
    <script src="{% static 'chart.js/dist/chart.umd.js' %}"></script>
    <script src="{% static 'leaflet/dist/leaflet.js' %}"></script>
    <script src="{% static 'aos/dist/aos.js' %}"></script>
    <script src="{% static 'animejs/lib/anime.min.js' %}"></script>
    <script src="{% static 'flowbite/dist/flowbite.js' %}"></script>

    <!-- Custom JS -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');
            const toggleSidebarMobile = document.getElementById('toggleSidebarMobile');
            const mainContent = document.getElementById('main-content');
        
            function toggleSidebar() {
                sidebar.classList.toggle('sidebar-closed');
                mainContent.classList.toggle('lg:ml-0');
                mainContent.classList.toggle('lg:ml-64');
            }
        
            toggleSidebarMobile.addEventListener('click', toggleSidebar);
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
